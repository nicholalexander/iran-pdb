<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligence Feed — Iran PDB</title>
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111820;
    --border: #1e2a3a;
    --text: #c8cdd3;
    --text-dim: #6b7785;
    --accent: #8B0000;
    --accent-light: #c0392b;
    --link: #4a9eff;
    --tag-iran: #8B0000;
    --tag-relevant: #2c5f2d;
    --tag-source: #1a3a5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 0;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--accent-light);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  header .meta {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
  }
  .controls {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.8rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .controls input[type="search"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    font-size: 0.8rem;
    flex: 1;
    min-width: 200px;
  }
  .controls button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .controls button:hover, .controls button.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .feed {
    max-width: 900px;
    margin: 0 auto;
    padding: 1rem 2rem;
  }
  .item {
    border-bottom: 1px solid var(--border);
    padding: 1rem 0;
    transition: background 0.1s;
  }
  .item:hover {
    background: rgba(255,255,255,0.02);
  }
  .item-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
  }
  .item-title {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    text-decoration: none;
    flex: 1;
  }
  .item-title:hover {
    color: var(--link);
  }
  .item-time {
    font-size: 0.7rem;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .item-meta {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.4rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 0.65rem;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-source {
    background: var(--tag-source);
    color: #7ab0e0;
  }
  .tag-iran {
    background: var(--tag-iran);
    color: #ff9999;
  }
  .tag-relevant {
    background: var(--tag-relevant);
    color: #8bc38b;
  }
  .item-summary {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 0.4rem;
    line-height: 1.4;
  }
  .stats {
    display: flex;
    gap: 1.5rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 0.5rem;
  }
  .stats span { color: var(--accent-light); font-weight: 600; }
  .empty {
    text-align: center;
    padding: 3rem;
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  @media (max-width: 600px) {
    header { padding: 1rem; }
    .feed { padding: 0.5rem 1rem; }
    .item-header { flex-direction: column; gap: 0.3rem; }
  }
</style>
</head>
<body>

<header>
  <h1>🦉 Intelligence Feed</h1>
  <div class="meta" id="meta">Loading...</div>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <input type="search" id="search" placeholder="Filter by keyword...">
    <button data-filter="all" class="active">All</button>
    <button data-filter="iran">Iran Only</button>
    <button data-filter="relevant">Relevant</button>
    <button data-filter="western">Western</button>
    <button data-filter="iranian">Iranian</button>
    <button data-filter="russian">Russian</button>
    <button data-filter="defense">Defense</button>
  </div>
</header>

<div class="feed" id="feed">
  <div class="empty">Loading feed data...</div>
</div>

<script>
let allItems = [];
let currentFilter = 'all';

async function loadFeed() {
  try {
    const resp = await fetch('feed-data.json?' + Date.now());
    const data = await resp.json();
    allItems = data.items || [];

    const meta = data.meta || {};
    document.getElementById('meta').textContent =
      `Last updated: ${formatTime(meta.last_updated)} · ${meta.total_items} items from ${meta.feeds_configured} feeds`;

    const iranCount = allItems.filter(i => i.iran_specific).length;
    const relevantCount = allItems.filter(i => i.relevant).length;
    document.getElementById('stats').innerHTML =
      `<div>Iran-specific: <span>${iranCount}</span></div>` +
      `<div>Relevant: <span>${relevantCount}</span></div>` +
      `<div>Total: <span>${allItems.length}</span></div>` +
      (Object.keys(meta.errors || {}).length > 0
        ? `<div style="color:#e74c3c">Feed errors: <span>${Object.keys(meta.errors).length}</span></div>`
        : '');

    render();
  } catch (e) {
    document.getElementById('feed').innerHTML =
      `<div class="empty">Error loading feed: ${e.message}</div>`;
  }
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  let items = allItems;

  // Apply filter
  if (currentFilter === 'iran') items = items.filter(i => i.iran_specific);
  else if (currentFilter === 'relevant') items = items.filter(i => i.relevant);
  else if (['western','iranian','russian','defense','regional'].includes(currentFilter))
    items = items.filter(i => i.category === currentFilter);

  // Apply search
  if (search) {
    items = items.filter(i =>
      (i.title + ' ' + i.summary + ' ' + i.source).toLowerCase().includes(search)
    );
  }

  if (items.length === 0) {
    document.getElementById('feed').innerHTML = '<div class="empty">No items match your filter.</div>';
    return;
  }

  document.getElementById('feed').innerHTML = items.map(item => `
    <div class="item">
      <div class="item-header">
        <a class="item-title" href="${escHtml(item.link)}" target="_blank" rel="noopener">
          ${escHtml(item.title)}
        </a>
        <div class="item-time">${timeAgo(item.published)}</div>
      </div>
      <div class="item-meta">
        <span class="tag tag-source">${escHtml(item.source)}</span>
        ${item.iran_specific ? '<span class="tag tag-iran">Iran</span>' : ''}
        ${item.relevant && !item.iran_specific ? '<span class="tag tag-relevant">Relevant</span>' : ''}
      </div>
      ${item.summary ? `<div class="item-summary">${escHtml(item.summary)}</div>` : ''}
    </div>
  `).join('');
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

function formatTime(iso) {
  if (!iso) return 'Unknown';
  try {
    return new Date(iso).toLocaleString('en-US', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
    });
  } catch { return iso; }
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

// Filter buttons
document.querySelectorAll('.controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// Search
document.getElementById('search').addEventListener('input', render);

// Load
loadFeed();

// Auto-refresh every 5 min
setInterval(loadFeed, 300000);
</script>
</body>
</html>
