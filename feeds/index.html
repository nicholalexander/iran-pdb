<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligence Feed — Iran PDB</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header>
<div class="container">
  <h1>🦉 Intelligence Feed</h1>
  <div class="meta" id="meta">Loading...</div>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <input type="search" id="search" placeholder="Filter by keyword...">
    <button data-filter="all" class="active">All</button>
    <button data-filter="iran">Iran Only</button>
    <button data-filter="relevant">Relevant</button>
    <button data-filter="western">Western</button>
    <button data-filter="iranian">Iranian</button>
    <button data-filter="russian">Russian</button>
    <button data-filter="defense">Defense</button>
  </div>
</div>
</header>

<main class="container">
<div class="feed" id="feed">
  <div class="empty">Loading feed data...</div>
</div>
</main>

<script>
let allItems = [];
let currentFilter = 'all';

async function loadFeed() {
  try {
    const resp = await fetch('feed-data.json?' + Date.now());
    const data = await resp.json();
    allItems = data.items || [];

    const meta = data.meta || {};
    document.getElementById('meta').textContent =
      `Last updated: ${formatTime(meta.last_updated)} · ${meta.total_items} items from ${meta.feeds_configured} feeds`;

    const iranCount = allItems.filter(i => i.iran_specific).length;
    const relevantCount = allItems.filter(i => i.relevant).length;
    document.getElementById('stats').innerHTML =
      `<div>Iran-specific: <span>${iranCount}</span></div>` +
      `<div>Relevant: <span>${relevantCount}</span></div>` +
      `<div>Total: <span>${allItems.length}</span></div>` +
      (Object.keys(meta.errors || {}).length > 0
        ? `<div style="color:#e74c3c">Feed errors: <span>${Object.keys(meta.errors).length}</span></div>`
        : '');

    render();
  } catch (e) {
    document.getElementById('feed').innerHTML =
      `<div class="empty">Error loading feed: ${e.message}</div>`;
  }
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  let items = allItems;

  // Apply filter
  if (currentFilter === 'iran') items = items.filter(i => i.iran_specific);
  else if (currentFilter === 'relevant') items = items.filter(i => i.relevant);
  else if (['western','iranian','russian','defense','regional'].includes(currentFilter))
    items = items.filter(i => i.category === currentFilter);

  // Apply search
  if (search) {
    items = items.filter(i =>
      (i.title + ' ' + i.summary + ' ' + i.source).toLowerCase().includes(search)
    );
  }

  if (items.length === 0) {
    document.getElementById('feed').innerHTML = '<div class="empty">No items match your filter.</div>';
    return;
  }

  document.getElementById('feed').innerHTML = items.map(item => `
    <div class="item">
      <div class="item-header">
        <a class="item-title" href="${escHtml(item.link)}" target="_blank" rel="noopener">
          ${escHtml(item.title)}
        </a>
        <div class="item-time">${timeAgo(item.published)}</div>
      </div>
      <div class="item-meta">
        <span class="tag tag-source">${escHtml(item.source)}</span>
        ${item.iran_specific ? '<span class="tag tag-iran">Iran</span>' : ''}
        ${item.relevant && !item.iran_specific ? '<span class="tag tag-relevant">Relevant</span>' : ''}
      </div>
      ${item.summary ? `<div class="item-summary">${escHtml(item.summary)}</div>` : ''}
    </div>
  `).join('');
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

function formatTime(iso) {
  if (!iso) return 'Unknown';
  try {
    return new Date(iso).toLocaleString('en-US', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
    });
  } catch { return iso; }
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

// Filter buttons
document.querySelectorAll('.controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// Search
document.getElementById('search').addEventListener('input', render);

// Load
loadFeed();

// Auto-refresh every 5 min
setInterval(loadFeed, 300000);
</script>
<script src="assets/nav.js"></script>
</body>
</html>
