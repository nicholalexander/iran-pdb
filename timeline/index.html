<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conflict Timeline — Iran Intelligence Briefings</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header>
<div class="container">
<h1>Conflict Timeline</h1>
<p>US-Iran War — Feb 28 – Mar 7, 2026</p>
</div>
</header>

<main class="container">
<div class="classification">UNCLASSIFIED // OPEN SOURCE // AI-GENERATED</div>

<div class="stats-bar">
<div class="stat-box"><span class="num" id="stat-events">—</span><span class="lbl">Events</span></div>
<div class="stat-box"><span class="num">7</span><span class="lbl">Days</span></div>
<div class="stat-box"><span class="num">1,332+</span><span class="lbl">Iran Dead</span></div>
<div class="stat-box"><span class="num">6</span><span class="lbl">US KIA</span></div>
<div class="stat-box"><span class="num">$92</span><span class="lbl">WTI $/bbl</span></div>
</div>

<div class="controls">
<input type="text" class="search-box" id="search" placeholder="Search events... (e.g. Hormuz, Hezbollah, oil, Trump)">
<div class="filters">
<button class="filter-btn active" data-cat="all">All</button>
<button class="filter-btn" data-cat="military">⚔ Military</button>
<button class="filter-btn" data-cat="diplomatic">🌐 Diplomatic</button>
<button class="filter-btn" data-cat="economic">💰 Economic</button>
<button class="filter-btn" data-cat="humanitarian">🏥 Humanitarian</button>
<button class="filter-btn" data-cat="domestic">🏛 Domestic</button>
</div>
<div class="result-count" id="resultCount"></div>
</div>

<div class="timeline" id="timeline"></div>

<div class="no-results" id="noResults" style="display:none">No events match your filters.</div>
</main>

<script>
const CAT_LABELS = {
  military: '⚔ Military',
  diplomatic: '🌐 Diplomatic',
  economic: '💰 Economic',
  humanitarian: '🏥 Humanitarian',
  domestic: '🏛 Domestic/Political'
};

const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

let events = [];
let activeFilter = 'all';
let searchQuery = '';

fetch('events.json')
  .then(r => r.json())
  .then(data => { events = data; render(); })
  .catch(() => { document.getElementById('timeline').innerHTML = '<p style="color:#8b0000">Failed to load events data.</p>'; });

function render() {
  const tl = document.getElementById('timeline');
  const nr = document.getElementById('noResults');
  const rc = document.getElementById('resultCount');

  const filtered = events.filter(e => {
    if (activeFilter !== 'all' && e.category !== activeFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return (e.headline + ' ' + e.detail + ' ' + e.source).toLowerCase().includes(q);
    }
    return true;
  });

  document.getElementById('stat-events').textContent = events.length;

  if (!filtered.length) {
    tl.innerHTML = '';
    nr.style.display = 'block';
    rc.textContent = '0 events';
    return;
  }
  nr.style.display = 'none';
  rc.textContent = filtered.length + ' of ' + events.length + ' events';

  let html = '';
  let currentDay = '';

  filtered.forEach(e => {
    if (e.date !== currentDay) {
      currentDay = e.date;
      const d = new Date(e.date + 'T12:00:00Z');
      const dayName = DAY_NAMES[d.getUTCDay()];
      html += `<div class="day-separator"><h2>${e.date}<span class="day-label">${dayName}</span></h2></div>`;
    }
    html += `<div class="event" data-cat="${e.category}" onclick="toggleDetail(this)">
      <div class="event-header">
        <span class="event-time">${e.time}</span>
        <span class="event-cat cat-${e.category}">${CAT_LABELS[e.category] || e.category}</span>
        <span class="event-headline">${hl(e.headline)}</span>
        <span class="event-expand">▼</span>
      </div>
      <div class="event-detail" id="detail-${e.id}">
        <p>${hl(e.detail)}</p>
        <p class="event-source">Sources: ${hl(e.source)}</p>
        <p class="event-link"><a href="../${e.briefing}">View full briefing →</a></p>
      </div>
    </div>`;
  });

  tl.innerHTML = html;
}

function hl(text) {
  if (!searchQuery) return text;
  const q = searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + q + ')', 'gi'), '<mark>$1</mark>');
}

function toggleDetail(el) {
  const d = el.querySelector('.event-detail');
  const arrow = el.querySelector('.event-expand');
  d.classList.toggle('open');
  arrow.textContent = d.classList.contains('open') ? '▲' : '▼';
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});
</script>
<script src="assets/nav.js"></script>
</body>
</html>
