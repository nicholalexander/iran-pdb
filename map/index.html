<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Situation Map — Iran Intelligence Briefings</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header>
<div class="container">
<h1>Situation Map</h1>

</div>
</header>

<main class="container">
<div class="controls">
<label>TIMELINE:</label>
<input type="range" id="timeline-slider" min="0" max="100" value="100">
<span id="date-display">ALL EVENTS</span>
<span id="event-count"></span>
</div>
<div id="map"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
(function(){
const COLORS = {
  strike: '#8b0000',
  naval: '#2266cc',
  humanitarian: '#cc7700',
  infrastructure: '#ccaa00'
};
const LABELS = {
  strike: 'Strikes',
  naval: 'Naval',
  humanitarian: 'Humanitarian',
  infrastructure: 'Infrastructure'
};

const map = L.map('map',{
  center:[30,50],
  zoom:5,
  zoomControl:true,
  maxBounds:[[-10,-20],[55,90]],
  minZoom:3
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains:'abcd',
  maxZoom:18
}).addTo(map);

function makeIcon(color){
  return L.divIcon({
    className:'',
    html:`<svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="${color}" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" opacity="0.85"/></svg>`,
    iconSize:[20,20],
    iconAnchor:[10,10],
    popupAnchor:[0,-10]
  });
}

function clusterIconFn(color){
  return function(cluster){
    const n=cluster.getChildCount();
    return L.divIcon({
      html:`<div style="background:${color};color:#fff;border:2px solid rgba(255,255,255,0.3);border-radius:50%;width:36px;height:36px;line-height:36px;text-align:center;font-family:monospace;font-weight:bold;font-size:0.75rem">${n}</div>`,
      className:'',iconSize:[36,36]
    });
  };
}

const layerGroups={};
const allMarkers=[];
let allData=[];

Object.keys(COLORS).forEach(cat=>{
  layerGroups[cat]=L.markerClusterGroup({
    iconCreateFunction:clusterIconFn(COLORS[cat]),
    maxClusterRadius:40,
    spiderfyOnMaxZoom:true,
    showCoverageOnHover:false
  });
  map.addLayer(layerGroups[cat]);
});

// Airspace polygons
const airspaceGroup=L.layerGroup();
const hormuzClosed=L.polygon([
  [27.1,56.0],[26.0,56.8],[25.5,56.5],[26.0,55.5],[27.0,55.8]
],{color:'#ff4444',fillColor:'#ff4444',fillOpacity:0.1,weight:1,dashArray:'5,5'}).bindPopup('<h3>Strait of Hormuz — Selective Closure</h3><div class="meta">2026-03-02 — ONGOING</div><div class="detail">IRGC declared closure. Chinese ships passing. 2 transits/day.</div>');
airspaceGroup.addLayer(hormuzClosed);

const kuwaitAirspace=L.polygon([
  [30.1,46.5],[30.1,48.5],[28.5,48.5],[28.5,46.5]
],{color:'#ff8800',fillColor:'#ff8800',fillOpacity:0.08,weight:1,dashArray:'5,5'}).bindPopup('<h3>Kuwait Airspace — CLOSED</h3><div class="meta">2026-03-02 — ONGOING</div><div class="detail">Fully closed after airport damage.</div>');
airspaceGroup.addLayer(kuwaitAirspace);

const redSea=L.polygon([
  [15.5,41.0],[13.0,43.5],[12.5,43.0],[14.0,41.5]
],{color:'#ff4444',fillColor:'#ff4444',fillOpacity:0.08,weight:1,dashArray:'5,5'}).bindPopup('<h3>Red Sea / Bab el-Mandeb</h3><div class="meta">ONGOING</div><div class="detail">Effectively closed to Israeli/US shipping by Houthis.</div>');
airspaceGroup.addLayer(redSea);
map.addLayer(airspaceGroup);

const slider=document.getElementById('timeline-slider');
const dateDisplay=document.getElementById('date-display');
const eventCount=document.getElementById('event-count');

let minTime,maxTime;

function popup(d){
  return `<h3>${d.name}</h3><div class="meta">${new Date(d.date).toUTCString().slice(0,22)} UTC · ${d.category.toUpperCase()}</div><div class="detail">${d.detail}</div><div style="font-size:0.6rem;color:#666;margin-bottom:4px">Source: ${d.source}</div><a href="${d.briefingUrl}">Full Briefing →</a>`;
}

function updateMap(){
  const pct=parseInt(slider.value);
  let cutoff;
  if(pct>=100){
    cutoff=maxTime;
    dateDisplay.textContent='ALL EVENTS';
  } else {
    cutoff=minTime+(maxTime-minTime)*(pct/100);
    const d=new Date(cutoff);
    dateDisplay.textContent=d.toISOString().slice(0,16).replace('T',' ')+ ' UTC';
  }
  let count=0;
  Object.keys(layerGroups).forEach(cat=>layerGroups[cat].clearLayers());
  allMarkers.forEach(({marker,data})=>{
    const t=new Date(data.date).getTime();
    if(t<=cutoff){
      layerGroups[data.category].addLayer(marker);
      count++;
    }
  });
  eventCount.textContent=`${count} event${count!==1?'s':''}`;
}

fetch('locations.json').then(r=>r.json()).then(data=>{
  allData=data;
  const times=data.map(d=>new Date(d.date).getTime());
  minTime=Math.min(...times);
  maxTime=Math.max(...times);

  data.forEach(d=>{
    const m=L.marker([d.lat,d.lng],{icon:makeIcon(COLORS[d.category]||'#888')}).bindPopup(popup(d));
    allMarkers.push({marker:m,data:d});
  });
  updateMap();
});

slider.addEventListener('input',updateMap);

// Layer control
const overlays={};
Object.keys(LABELS).forEach(cat=>{
  overlays[`<span style="color:${COLORS[cat]}">\u25CF</span> ${LABELS[cat]}`]=layerGroups[cat];
});
overlays['<span style="color:#ff4444">▨</span> Airspace / Maritime Zones']=airspaceGroup;
L.control.layers(null,overlays,{collapsed:false,position:'topright'}).addTo(map);

// Legend
const legend=L.control({position:'bottomright'});
legend.onAdd=function(){
  const div=L.DomUtil.create('div','legend');
  div.innerHTML='<h4>Legend</h4>'+Object.keys(LABELS).map(cat=>`<div class="legend-item"><span class="legend-dot" style="background:${COLORS[cat]}"></span>${LABELS[cat]}</div>`).join('')+'<div class="legend-item"><span class="legend-dot" style="background:transparent;border:1px dashed #ff4444"></span>Restricted Zones</div>';
  return div;
};
legend.addTo(map);

})();
</script>
<script src="assets/nav.js"></script>
</body>
</html>
